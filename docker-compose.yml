services:
  postgres:
    container_name: postgres
    image: postgres:18
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${POSTGRES_USERNAME:-postgres}"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nest-base}
      POSTGRES_HOST_AUTH_METHOD: trust
      PGUSER: "${POSTGRES_USERNAME:-postgres}"
      PGPASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    networks:
      - nest_base
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -p 5432 -U ${POSTGRES_USERNAME:-postgres} -d ${POSTGRES_DB:-nest-base}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    container_name: redis
    image: redis:8-alpine
    restart: always
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    networks:
      - nest_base
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "${REDIS_PASSWORD:-password}" -h localhost -p 6379 ping | grep -q PONG',
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379
      S3_ENDPOINT: http://seaweedfs:8333
      KAFKA_HOST: redpanda
      KAFKA_PORT: 29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:${APP_PORT:-3000}/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - nest_base
    volumes:
      - logs:/app/logs

  redpanda:
    container_name: redpanda
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.1
    env_file:
      - .env
    command:
      - redpanda
      - start
      - --smp
      - "2"
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --check=false
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "29092:29092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rpk cluster health --brokers=localhost:29092 >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - nest_base

  opensearch:
    container_name: opensearch
    image: opensearchproject/opensearch:2.11.0
    env_file:
      - .env
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1024m -Xmx1024m"
      - DISABLE_INSTALL_DEMO_CONFIG=false
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-admin}
      - plugins.security.disabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
      - "9600:9600"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health >/dev/null || wget -qO- http://localhost:9200/_cluster/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - nest_base

  opensearch-dashboards:
    container_name: opensearch-dashboards
    image: opensearchproject/opensearch-dashboards:2.11.0
    env_file:
      - .env
    volumes:
      - ./fluent-bit/opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
    ports:
      - "${DASHBOARDS_PORT:-5601}:5601"
    environment:
      - OPENSEARCH_HOSTS=https://opensearch:9200
      - OPENSEARCH_USERNAME=${OPENSEARCH_ADMIN_USER:-admin}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-admin}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:5601/api/status >/dev/null || wget -qO- http://localhost:5601/api/status >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - nest_base

  fluent-bit-shipper:
    container_name: fluent-bit-shipper
    image: fluent/fluent-bit:latest
    env_file:
      - .env
    volumes:
      - ./fluent-bit/shipper.conf:/fluent-bit/etc/fluent-bit.conf
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf
      - ./logs:/app/logs:ro
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[f]luent-bit'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nest_base
    depends_on:
      - redpanda

  fluent-bit-indexer:
    container_name: fluent-bit-indexer
    image: fluent/fluent-bit:latest
    env_file:
      - .env
    volumes:
      - ./fluent-bit/indexer.conf:/fluent-bit/etc/fluent-bit.conf
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf
    environment:
      - OPENSEARCH_ADMIN_USER=${OPENSEARCH_ADMIN_USER:-admin}
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-admin}
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[f]luent-bit'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nest_base
    depends_on:
      - redpanda
      - opensearch

  seaweedfs:
    image: chrislusf/seaweedfs:3.59
    container_name: seaweedfs
    env_file:
      - .env
    command: "server -master -volume -filer -s3 -s3.config=/etc/seaweedfs/s3.json"
    ports:
      - "9333:9333"
      - "${SEAWEEDFS_VOLUME_PORT:-8080}:8080"
      - "${SEAWEEDFS_FILER_PORT:-8888}:8888"
      - "${SEAWEEDFS_FILER_S3_PORT:-8333}:8333"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9333/cluster/status >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - seaweedfs_data:/data
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json
    networks:
      - nest_base

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "${KAFKA_UI_PORT:-8088}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: redpanda:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - nest_base
    depends_on:
      - redpanda

volumes:
  pgdata:
  redisdata:
  opensearch_data:
  seaweedfs_data:
  logs:

networks:
  nest_base:
    driver: bridge
